principles:
  - name: Visibility
    description: Customer-facing consumption (interest, fees, treasury services) is surfaced through online
      banking statements and treasury reporting, not a developer billing API.
  - name: Allocation
    description: Not applicable on a developer surface; allocation is at the corporate-treasury account
      level, governed by the bank's commercial banking agreement.
  - name: Optimization
    description: Not applicable at the API/FinOps layer; account-level optimization (sweep accounts, fee
      analysis) is the customer's treasury function.
  - name: Accountability
    description: Customer-level accountability is governed by the South State commercial banking agreement,
      not by a developer/tenant contract.
