description: South State Corporation is a regional U.S. bank holding company (parent of South State Bank,
  N.A.). It operates a member-facing retail / commercial banking site and does not publish a public developer
  API or partner API plan SKU. Account-pricing schedules (deposit, lending, treasury management) are
  product disclosures, not API plans.
sources:
  - https://www.southstatebank.com/
notes: South State does not publish a public developer API or plan tiers; southstatebank.com/business/api
  returns 403/404 to automated retrieval and no api.southstatebank.com developer portal is publicly listed.
  Treasury management and partner integrations are negotiated bilaterally. Trimmed to a single Contact
  Sales placeholder; reconciled is false.
plans:
